name: Release

# Push a tag like v1.2.3 to build, package, sign, and publish a GitHub Release.
# Or run via workflow_dispatch for a dry-run: the build/package jobs run and upload
# artifacts, but the "Publish GitHub Release" job is skipped (it is tag-gated).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    env:
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # MinVer derives the version from the tag

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build & test
        run: |
          dotnet build FlyingAzure.slnx -c Release
          dotnet test FlyingAzure.slnx -c Release --no-build

      - name: Package screensaver (self-contained .scr + scripts -> zip)
        run: pwsh ./package.ps1 -OutputZip "${{ github.workspace }}/FlyingAzure-Screensaver-win-x64.zip"

      # Code-signing is optional: jobs degrade to unsigned artifacts when the cert
      # secret is absent, so forks and PR validation still build.
      - name: Sign screensaver
        if: ${{ env.WINDOWS_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $scr = 'build/FlyingAzure-Screensaver/FlyingAzure.scr'
          & "${env:ProgramFiles(x86)}/Windows Kits/10/bin/x64/signtool.exe" sign `
            /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 $scr
          # Re-zip with the signed .scr
          pwsh ./package.ps1 -OutputZip "${{ github.workspace }}/FlyingAzure-Screensaver-win-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: FlyingAzure-Screensaver-win-x64.zip
          if-no-files-found: error

  macos:
    name: macOS .saver (.pkg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # Phase-gated scaffold. Today this only builds the cross-platform Core so the
      # macOS leg of the release is exercised. The real artifact requires:
      #   1. FlyingAzure.Engine published as a NativeAOT dylib (osx-arm64 + osx-x64, lipo'd)
      #   2. the Swift .saver built via xcodebuild
      #   3. codesign (Developer ID) of every embedded dylib + the bundle, then notarize + staple
      #   4. productbuild a FlyingAzure-<version>.pkg
      # Secrets (added when Phase 0 proves the approach): APPLE_DEVELOPER_ID_CERT (.p12),
      # APPLE_CERT_PASSWORD, APPLE_TEAM_ID, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD.
      - name: Build FlyingAzure.Core (parity check)
        run: dotnet build src/FlyingAzure.Core/FlyingAzure.Core.csproj -c Release

      - name: Note macOS packaging status
        run: echo "::notice::macOS .saver packaging is scaffolded; produces no artifact until Phases 1+3 land. See plan."

  release:
    name: Publish GitHub Release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    # Tag-gated: only publishes a Release for an actual v* tag push. A manual
    # workflow_dispatch run skips this job, making it a safe build/package dry-run.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/FlyingAzure-Screensaver-win-x64.zip

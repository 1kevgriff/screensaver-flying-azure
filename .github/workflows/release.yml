name: Release

# Push a tag like v1.2.3 to build, package, sign, and publish a GitHub Release.
# Or run via workflow_dispatch for a dry-run: the build/package jobs run and upload
# artifacts, but the "Publish GitHub Release" job is skipped (it is tag-gated).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    env:
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # MinVer derives the version from the tag

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build & test
        run: |
          dotnet build FlyingAzure.slnx -c Release
          dotnet test FlyingAzure.slnx -c Release --no-build

      - name: Package screensaver (self-contained .scr + scripts -> zip)
        run: pwsh ./package.ps1 -OutputZip "${{ github.workspace }}/FlyingAzure-Screensaver-win-x64.zip"

      # Code-signing is optional: jobs degrade to unsigned artifacts when the cert
      # secret is absent, so forks and PR validation still build.
      - name: Sign screensaver
        if: ${{ env.WINDOWS_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $scr = 'build/FlyingAzure-Screensaver/FlyingAzure.scr'
          & "${env:ProgramFiles(x86)}/Windows Kits/10/bin/x64/signtool.exe" sign `
            /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 $scr
          # Re-zip with the signed .scr
          pwsh ./package.ps1 -OutputZip "${{ github.workspace }}/FlyingAzure-Screensaver-win-x64.zip"

      # Build the one-click installer (bundles the now-signed .scr).
      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $ver = if ($ref -like 'refs/tags/v*') { $ref -replace '^refs/tags/v','' } else { '0.0.0' }
          pwsh ./installer/build-installer.ps1 -Version $ver

      - name: Sign installer
        if: ${{ env.WINDOWS_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          & "${env:ProgramFiles(x86)}/Windows Kits/10/bin/x64/signtool.exe" sign `
            /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 FlyingAzure-Setup-x64.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            FlyingAzure-Screensaver-win-x64.zip
            FlyingAzure-Setup-x64.exe
          if-no-files-found: error

  macos:
    name: macOS .saver
    runs-on: macos-latest
    env:
      APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
      APPLE_INSTALLER_CERT: ${{ secrets.APPLE_INSTALLER_CERT }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      # Builds the .saver (publish AOT engine -> xcodebuild -> embed dylibs -> ad-hoc sign -> zip).
      - name: Build macOS .saver (universal)
        run: bash macos/build-saver.sh

      # Real Developer ID signing + notarization, guarded on secrets so it degrades to the
      # ad-hoc-signed zip on forks/PRs. Re-signs every embedded dylib + the bundle with the
      # developer's Team ID (the reliable path, since the .saver loads inside Apple's appex),
      # then notarizes and staples.
      - name: Sign & notarize (Developer ID)
        if: ${{ env.APPLE_DEVELOPER_ID_CERT != '' }}
        run: bash macos/sign-notarize.sh "FlyingAzure-osx-universal.saver.zip"

      # Build a guided .pkg installer (installs into /Library/Screen Savers). Needs a
      # Developer ID INSTALLER cert; skipped until that secret is present.
      - name: Build .pkg installer
        if: ${{ env.APPLE_INSTALLER_CERT != '' }}
        run: |
          ref="${{ github.ref }}"
          ver="${ref#refs/tags/v}"; [ "$ver" = "$ref" ] && ver="0.0.0"
          bash macos/build-pkg.sh "FlyingAzure-osx-universal.saver.zip" "$ver"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: |
            FlyingAzure-osx-universal.saver.zip
            FlyingAzure-osx-*.pkg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    # Tag-gated: only publishes a Release for an actual v* tag push. A manual
    # workflow_dispatch run skips this job, making it a safe build/package dry-run.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Attaches everything the build jobs produced: Windows installer + zip, the
          # macOS .saver, and the .pkg installer when the Developer ID Installer cert is set.
          files: |
            artifacts/windows/*
            artifacts/macos/*

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows build, test & package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # MinVer needs full history + tags to compute the version

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore FlyingAzure.slnx

      - name: Build
        run: dotnet build FlyingAzure.slnx -c Release --no-restore

      - name: Test
        run: dotnet test FlyingAzure.slnx -c Release --no-build --verbosity normal

      - name: Package screensaver (.scr + install scripts -> zip)
        run: pwsh ./package.ps1 -OutputZip "${{ github.workspace }}/FlyingAzure-Screensaver-win-x64.zip"

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: FlyingAzure-Screensaver-win-x64
          path: FlyingAzure-Screensaver-win-x64.zip
          if-no-files-found: error

  macos:
    name: macOS cross-platform build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # The cross-platform stack: portable Core + the SkiaSharp render Engine and its
      # golden-image tests. These prove the shared render path builds and produces pixels
      # on macOS — the parity guarantee behind "one engine, two hosts". The .saver bundle
      # (xcodebuild + codesign + notarize) is wired into release.yml once Phase 3 lands.
      - name: Build & test cross-platform engine
        run: |
          dotnet build src/FlyingAzure.Engine/FlyingAzure.Engine.csproj -c Release
          dotnet test tests/FlyingAzure.Engine.Tests/FlyingAzure.Engine.Tests.csproj -c Release

      - name: Install XcodeGen
        run: brew install xcodegen

      # Publishes the NativeAOT engine dylib, builds the Swift ScreenSaverView .saver via
      # xcodebuild, embeds the engine + Skia dylibs, ad-hoc signs, and zips it.
      - name: Build macOS .saver
        run: bash macos/build-saver.sh osx-arm64

      - name: Upload macOS .saver
        uses: actions/upload-artifact@v7
        with:
          name: FlyingAzure-macos-saver
          path: FlyingAzure-osx-arm64.saver.zip
          if-no-files-found: error
